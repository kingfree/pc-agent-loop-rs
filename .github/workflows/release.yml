name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── CLI: Linux, macOS, Windows ───────────────────────────────────────────
  build-cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: pc-agent-loop
            archive: pc-agent-loop-linux-x86_64.tar.gz

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: pc-agent-loop
            archive: pc-agent-loop-linux-aarch64.tar.gz
            cross: true

          - os: macos-14
            target: aarch64-apple-darwin
            artifact: pc-agent-loop
            archive: pc-agent-loop-macos-aarch64.tar.gz

          - os: macos-14
            target: x86_64-apple-darwin
            artifact: pc-agent-loop
            archive: pc-agent-loop-macos-x86_64.tar.gz

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: pc-agent-loop.exe
            archive: pc-agent-loop-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set cross-compiler env (Linux aarch64)
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cli-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cli-

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p pc-agent-loop

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cp README.md LICENSE staging/
          tar -czf ${{ matrix.archive }} -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.artifact }}" staging
          Copy-Item README.md, LICENSE staging
          Compress-Archive -Path "staging\*" -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── GUI (Tauri): Linux, macOS, Windows ───────────────────────────────────
  build-gui:
    name: GUI (Tauri) ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-14
          - os: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-

      - name: Build and bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/gui
          # Only upload to Release when triggered by a tag
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('pc-agent-loop-rs {0}', github.ref_name) || '' }}
          releaseBody: |
            Cowork Agent — Tauri desktop app bundle.
            See the full release notes below.
          releaseDraft: false
          prerelease: false

  # ── Android: arm64-v8a, x86_64 ──────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Build Android .so (arm64-v8a + x86_64)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t x86_64 \
            -o jniLibs \
            build --release -p pc-agent-loop-android

      - name: Package Android
        run: |
          tar -czf pc-agent-loop-android-jniLibs.tar.gz jniLibs/
          find jniLibs -name "*.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pc-agent-loop-android-jniLibs.tar.gz
          path: pc-agent-loop-android-jniLibs.tar.gz

  # ── Create GitHub Release (CLI + Android artifacts) ──────────────────────
  release:
    name: Create Release
    needs: [build-cli, build-android]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## pc-agent-loop-rs ${{ github.ref_name }}

            ### CLI Downloads (single binary, no runtime needed)

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `pc-agent-loop-linux-x86_64.tar.gz` |
            | Linux aarch64 | `pc-agent-loop-linux-aarch64.tar.gz` |
            | macOS Apple Silicon | `pc-agent-loop-macos-aarch64.tar.gz` |
            | macOS Intel | `pc-agent-loop-macos-x86_64.tar.gz` |
            | Windows x86_64 | `pc-agent-loop-windows-x86_64.zip` |

            ### GUI (Tauri desktop app)
            Installers are listed separately above: `.msi` (Windows), `.dmg` (macOS), `.AppImage`/`.deb` (Linux).

            ### Android JNI
            | File |
            |------|
            | `pc-agent-loop-android-jniLibs.tar.gz` |

            ### Quick Start (CLI)
            ```bash
            tar -xzf pc-agent-loop-linux-x86_64.tar.gz
            echo '{"oai_config":{"apikey":"sk-...","apibase":"https://api.openai.com","model":"gpt-4o"}}' > mykey.json
            ./pc-agent-loop
            ```
